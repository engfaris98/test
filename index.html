/* ---------------- local storage (data on the phone only) ---------------- */

    console.error("saveKey failed", key, e);
    alert("⚠️ ما قدر يحفظ البيانات على هذا الجهاز/المتصفح. جرّب تفتح الملف من متصفح Chrome عادي (مو من واتساب أو تطبيق ملفات مباشرة) أو فعّل تخزين الموقع (Site Data) من إعدادات المتصفح.");

function ReceiptScreen({ payment, settings, onDone }) {

    const el = document.getElementById("print-receipt");
    return await html2canvas(el, { scale: 2, backgroundColor: "#ffffff" });
  };
  const downloadPDF = async () => {
    setBusy(true);
    try {
      const canvas = await captureCanvas();
      const imgData = canvas.toDataURL("image/png");
      const { jsPDF } = window.jspdf;
      const w = canvas.width / 2, h = canvas.height / 2;
      const pdf = new jsPDF({ unit: "pt", format: [w, h] });
      pdf.addImage(imgData, "PNG", 0, 0, w, h);
      pdf.save(`وصل-${payment.receiptNo}.pdf`);
    } catch (e) {
      alert("تعذر إنشاء ملف PDF، جرّب زر الطباعة بدلاً منه");
      console.error(e);
    }
    setBusy(false);
  };

    setBusy(true);

      const canvas = await captureCanvas();

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `وصل-${payment.receiptNo}.png`;

        URL.revokeObjectURL(url);
