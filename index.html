    const blob = new Blob([json], { type: "application/json" });
    const uri = await nativeSaveFile(blob, filename);
    return { ok: true, msg: `تم حفظ الملف باسم ${filename} داخل مجلد Documents الخاص بالتطبيق ✅`, uri };
  }
  const blob = new Blob([json], { type: "application/json" });

}

  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function resizeImageToDataUrl(file, maxSize) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) { height = Math.round((height * maxSize) / width); width = maxSize; }
        else if (height > maxSize) { width = Math.round((width * maxSize) / height); height = maxSize; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/png", 0.9));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function baseUrl(device) {
  const port = device.port ? `:${device.port}` : "";
  return `${device.protocol || "http"}://${device.ip}${port}`;
}
function basicAuthHeader(device) {
  return "Basic " + btoa(`${device.username || ""}:${device.password || ""}`);
}

async function fetchMikroTikStatus(device) {
  if (!device.ip) return { ok: false, msg: "ما فيه عنوان IP مسجَّل" };
  try {
    const headers = { Authorization: basicAuthHeader(device) };
    const resRes = await fetch(`${baseUrl(device)}/rest/system/resource`, { headers });
    if (!resRes.ok) return { ok: false, msg: `فشل الاتصال (كود ${resRes.status}) — تأكد من اليوزر/الباسورد وتفعيل خدمة www-ssl/www على الراوتر` };
    const resData = await resRes.json();
    let clients = null;
    try {
      const wRes = await fetch(`${baseUrl(device)}/rest/interface/wireless/registration-table`, { headers });
      if (wRes.ok) { const wData = await wRes.json(); clients = Array.isArray(wData) ? wData.length : null; }
    } catch (e) { /* بعض الأجهزة سلكية بدون واجهة لاسلكية */ }
    return { ok: true, uptime: resData.uptime || "—", cpuLoad: resData["cpu-load"] != null ? `${resData["cpu-load"]}%` : "—", boardName: resData["board-name"] || device.model, clients: clients != null ? clients : "—" };
  } catch (e) {
    return { ok: false, msg: "تعذر الاتصال: " + e.message + " — تأكد إنك على نفس الشبكة، والعنوان صحيح، وREST API مفعّل" };
  }
}

async function fetchUbiquitiStatus(device) {
  if (!device.ip) return { ok: false, msg: "ما فيه عنوان IP مسجَّل" };
  const base = baseUrl(device);
  try {
    try {
      await fetch(`${base}/login.cgi`, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(device.username || "")}&password=${encodeURIComponent(device.password || "")}`,
      });
    } catch (e) { /* بعض الإصدارات لا تملك login.cgi أصلًا، نكمل ونجرب status.cgi مباشرة */ }

    const headers = { Authorization: basicAuthHeader(device) };
    const res = await fetch(`${base}/status.cgi`, { headers, credentials: "include" });
    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      return { ok: false, msg: "الجهاز رجّع صفحة تسجيل دخول وليس بيانات JSON — تأكد من صحة اليوزر/الباسورد. لو صحيحة، فهذا الإصدار من AirOS قد يستخدم آلية تسجيل دخول مختلفة عن المتوقع." };
    }
    const wireless = data.wireless || {};
    const stations = wireless.sta || wireless.stations || [];
    return {
      ok: true,
      uptime: data.host && data.host.uptime ? `${Math.floor(data.host.uptime / 3600)} ساعة` : "—",
      signal: wireless.signal != null ? `${wireless.signal} dBm` : "—",
      noise: wireless.noisef != null ? `${wireless.noisef} dBm` : "—",
      clients: Array.isArray(stations) ? stations.length : "—",
      ccq: wireless.ccq != null ? `${(wireless.ccq / 10).toFixed(0)}%` : "—",
    };
  } catch (e) {
    return { ok: false, msg: "تعذر الاتصال: " + e.message + " — تأكد إنك على نفس الشبكة، وأن الجهاز يدعم واجهة status.cgi بهذا الإصدار" };
  }
}

async function fetchLiveDeviceStatus(device) {

function parseSshOutput(brand, command, text) {
  const raw = String(text || "");
  const kv = {};
  raw.split(/[\n;]+/).forEach((line) => {
    const m = line.match(/^\s*([A-Za-z0-9_.\-]+)\s*[:=]\s*(.+?)\s*$/);
    if (m) {
      const k = m[1].trim();
      const v = m[2].trim();
      if (k && v && !(k in kv)) kv[k] = v;
    }
  });

  const pick = (keys, label) => {
    for (const k of keys) { if (kv[k] != null && kv[k] !== "") return { label, value: kv[k] }; }
    return null;
  };

  let items = [];
  if (brand === "MikroTik") {
    items = [
      pick(["uptime"], "وقت التشغيل"),
      pick(["cpu-load"], "استخدام المعالج"),
      pick(["version"], "الإصدار"),
      pick(["board-name"], "الموديل"),
      pick(["free-memory"], "ذاكرة متاحة"),
      pick(["total-memory"], "إجمالي الذاكرة"),
    ].filter(Boolean);
  } else if (brand === "Ubiquiti") {
    items = [
      pick(["wlanConfig.1.essid", "essid", "status.1.ssid"], "اسم الشبكة"),
      pick(["signal", "wstats.signal", "status.1.signal"], "الإشارة"),
      pick(["noise", "wstats.noise", "status.1.noise"], "الضجيج"),
      pick(["ccq", "wstats.ccq", "status.1.ccq"], "CCQ"),
      pick(["uptime", "sysUptime", "host.uptime"], "وقت التشغيل"),
      pick(["wlanConfig.1.txrate", "txrate", "status.1.rate"], "سرعة الإرسال"),
      pick(["wlanConfig.1.rxrate", "rxrate"], "سرعة الاستقبال"),
    ].filter(Boolean);
  }

  if (items.length === 0) {
    items = Object.keys(kv).slice(0, 8).map((k) => ({ label: k, value: kv[k] }));
  }
  return items.length > 0 ? items : null;
}

function defaultSshCommand(brand) {

function parseMikroTikResource(text) {
  const map = {};
  text.split("\n").forEach((line) => {
    const idx = line.indexOf(":");
    if (idx === -1) return;
    const key = line.slice(0, idx).trim().toLowerCase().replace(/\s+/g, "-");
    const val = line.slice(idx + 1).trim();
    if (key) map[key] = val;
  });
  if (!Object.keys(map).length) return null;
  return [
    map["uptime"] && { label: "وقت التشغيل", value: map["uptime"] },
    map["version"] && { label: "الإصدار", value: map["version"] },
    map["cpu-load"] && { label: "استخدام المعالج", value: map["cpu-load"] },
    (map["free-memory"] || map["free-hdd-space"]) && { label: "ذاكرة متاحة", value: map["free-memory"] || map["free-hdd-space"] },
    map["board-name"] && { label: "الموديل", value: map["board-name"] },
  ].filter(Boolean);
}

function parseUbiquitiMca(text) {
  const map = {};
  text.split("\n").forEach((line) => {
    const idx = line.indexOf("=");
    if (idx === -1) return;
    map[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
  });
  if (!Object.keys(map).length) return null;
  const uptimeSec = Number(map["host.uptime"] || 0);
  const uptimeStr = uptimeSec ? `${Math.floor(uptimeSec / 86400)} يوم ${Math.floor((uptimeSec % 86400) / 3600)} ساعة` : null;
  return [
    map["wireless.essid"] && { label: "اسم الشبكة", value: map["wireless.essid"] },
    map["wireless.signal"] && { label: "الإشارة", value: `${map["wireless.signal"]} dBm` },
    map["wireless.ccq"] && { label: "CCQ", value: `${(Number(map["wireless.ccq"]) / 10).toFixed(0)}%` },
    map["wireless.noisef"] && { label: "الضوضاء", value: `${map["wireless.noisef"]} dBm` },
    uptimeStr && { label: "وقت التشغيل", value: uptimeStr },
    map["host.cpuload"] && { label: "استخدام المعالج", value: `${map["host.cpuload"]}%` },
  ].filter(Boolean);
}

function parseSshOutput(brand, command, text) {
  try {
    if (brand === "MikroTik" && command.includes("resource")) return parseMikroTikResource(text);
    if (brand === "Ubiquiti" && command.includes("mca-status")) return parseUbiquitiMca(text);

}

      view === "device-add" && React.createElement(DeviceForm, { onSave: handleAddDevice, onCancel: () => setView("network") }),
      view === "device-edit" && selectedDevice && React.createElement(DeviceForm, { initial: selectedDevice, onSave: handleEditDevice, onCancel: () => setView("network") }),
      sheetDevice && React.createElement(DeviceDetailSheet, {
        device: sheetDevice, onClose: () => setSheetDevice(null),
        onEdit: (d) => { setSelectedDevice(d); setSheetDevice(null); setViewRaw("device-edit"); },
        onDelete: handleDeleteDevice
      }),
      view === "add" && React.createElement(SubscriberForm, { title: "بيانات المشترك والباقة", onSave: handleAddSubscriber, onCancel: () => setView("home"), packages }),
      view === "edit" && selected && React.createElement(SubscriberForm, { title: "تعديل بيانات المشترك", initial: selected, onSave: handleEditSubscriber, onCancel: () => setView("home"), packages }),
      view === "renew" && (sheetSub || selected) && React.createElement(RenewForm, { sub: sheetSub || selected, onSave: handleRenew, onCancel: () => setView("home"), packages }),
      view === "debt" && (sheetSub || selected) && React.createElement(DebtPaymentForm, { sub: sheetSub || selected, onSave: handlePayDebt, onCancel: () => setView("home") }),
      view === "receipt" && React.createElement(ReceiptScreen, { payment: receiptData, settings, onDone: () => setView("home") }),
      view === "history" && React.createElement(HistoryScreen, { payments, debtPayments, subs, onOpen: (p) => { setReceiptData(p); setViewRaw("receipt"); } }),
      view === "settings" && React.createElement(SettingsScreen, { settings, onSave: (f) => { persistSettings(f); setView("home"); }, onOpenPackages: () => setViewRaw("packages"), themeName, onToggleTheme: toggleTheme }),
      view === "packages" && React.createElement(PackagesScreen, { packages, onSave: persistPackages }),
      sheetSub && React.createElement(DetailSheet, {
        sub: sheetSub, onClose: () => setSheetSub(null),
        onEdit: (s) => { setSelected(s); setSheetSub(null); setViewRaw("edit"); },
        onRenew: (s) => { setSheetSub(s); setViewRaw("renew"); },
        onPayDebt: (s) => { setSheetSub(s); setViewRaw("debt"); },
        onDelete: handleDelete,
        onReceipt: (s) => { const last = [...payments].filter((p) => p.subscriberId === s.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0]; if (last) { setReceiptData(last); setViewRaw("receipt"); } setSheetSub(null); }
      }),
      view !== "receipt" && React.createElement(BottomNav, { view, setView })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
